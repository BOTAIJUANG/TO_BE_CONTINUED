name: Sync Orders

on:
  repository_dispatch:
    types: [update-orders]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write orders.json
        run: |
          echo "${{ github.event.client_payload.data }}" | base64 -d | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          with open('orders.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')
          "

      - name: Commit and push
        run: |
          git config user.name "make-bot"
          git config user.email "make-bot@users.noreply.github.com"
          git add orders.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update orders.json"
            git push
          fi
