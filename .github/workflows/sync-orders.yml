name: Sync Orders

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch orders from Make
        run: |
          curl -s "https://hook.eu1.make.com/zxem83uppw44hqm0t7d7ovtbdsoy4inu" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          data = json.loads(raw)
          with open('orders.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')
          print(f'Fetched {len(data)} orders')
          "

      - name: Commit and push
        run: |
          git config user.name "make-bot"
          git config user.email "make-bot@users.noreply.github.com"
          git add orders.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update orders.json"
            git push
          fi
